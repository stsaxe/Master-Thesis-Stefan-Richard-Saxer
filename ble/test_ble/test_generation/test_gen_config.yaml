
seed: "TESTY"

node rules:
  - path: "**.packet"
    action:
      ref: "default_gen_strat_pdu"
      args: {transitions: [[20, 0], [30, 1], [50, 3], [50, 0b0100]]}

  - path: "**.advertising_data"
    action:
      ref: "default_gen_strat_adv_data_structs"
      args: { transitions: [[100, [0xFF, 0x01, 0x02]], [200, [0xFF, 0x0a, 0x16] ]]}

  - path: "**.16_bit_uuids"
    action:
      ref: "default_gen_strat_16_bit_uuid_count"
      args: { transitions: [ [ 100, 1], [ 200,2 ] ] }

field rules:
  - path: "**.device_name"
    name: 'TEST_NAME'
    action:
      ref: "generate_device_name_from_list"
      args:
        token: "MyTOKEN"

  - path: "**.company_id"
    action:
      ref: "real_company_id"
      args: { transitions: [[100, 0x004C], [200, 0xABCD]]}


  - path: "**.16_bit_uuid"
    action:
      ref: "real_uuid"
      args:
        token: "TestToken"


  - path: "**.adv_struct[adv_type=16].data"
    action:
      ref: "dult_protocol"
      args:
        token: "TestToken"
        network_id: ['21', '22', '23']

