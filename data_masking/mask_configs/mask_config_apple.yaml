seed: "Apple Continuity"

scopes:
  - name: "global scope"
    priority: 1
    path: "**.packet"

    rules:
      - name: "mask advertising address"
        path: "**.advertising_address"
        priority: 1
        action:
          ref: "mask_ble_address"
          args:
            rotation_type: "stream"


      - name: "mask_company_data"
        path: "**.adv_struct[adv_type=0xff].data"
        priority: 3

        condition:
          ref: "is_apple_continuity"
          args:
            continuity_type: ['07', '09', '10', '12', '16']

        action:
          ref: "mask_hex_data"
          args:
            start: 4
            rotation_type: "stream"





