seed: "Mask Default"

scopes:
  - name: "global scope"
    priority: 1
    path: "**.packet"

    rules:
      - name: "mask advertising address"
        path: "**.advertising_address"
        priority: 1
        action:
          ref: "mask_ble_address"
          args:
            rotation_type: "stream"


      - name: "mask_data"
        path: "**.adv_struct.data"
        priority: 2

        action:
          ref: "mask_hex_data"
          rotation_type: "stream"

      - name: "mask_device_name"
        path: "**.adv_struct.device_name"
        priority: 3

        action:
          ref: "mask_hex_data"
          args:
            rotation_type: "stream"




