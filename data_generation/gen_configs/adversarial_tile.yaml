seed: "Tile"

node rules:
  - path: "**.packet"
    action:
      ref: "default_gen_strat_pdu"
      args: { transitions: [ [ 1, 0b0000 ], [ 1, 0b0010 ], [ 1, 0b0110 ], [ 1, 0b0100 ] ] }


field rules:
  - path: "**.packet.channel"
    action:
      ref: "real_channel"

  - path: "**.device_name"
    action:
      ref: "generate_device_name_from_list"

  - path: "**.company_id"
    action:
      ref: "real_company_id"
      args: { transitions: [ [ 1660, 734 ] ] }

  - path: "**.16_bit_uuid"
    action:
      ref: "real_uuid"
      args:
        transitions: [ [ 1, 65261 ],
                       [ 1, 65260 ],
                       [ 1, 64900 ],
        ]

